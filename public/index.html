<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kees Hub | Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Your_kees</h1>
            <p class="subtitle">Secure, local-first AI infrastructure orchestration.</p>
        </header>

        <div class="filters">
            <label class="filter-item">
                <input type="checkbox" id="hide-disabled" onchange="renderProviders()">
                Hide Disabled
            </label>
            <label class="filter-item">
                <input type="checkbox" id="hide-missing" onchange="renderProviders()">
                Hide Missing
            </label>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;">#</th>
                        <th>Provider</th>
                        <th>Status</th>
                        <th>Configuration</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="providers-tbody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast">Successfully updated</div>

    <script src="app.js"></script>
</body>

</html>
